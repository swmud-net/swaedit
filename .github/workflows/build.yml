name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------
  # Linux — build only, no artifact upload
  # ---------------------------------------------------------------
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake build-essential \
            qt6-base-dev qt6-base-dev-tools \
            libqt6opengl6-dev libqt6openglwidgets6 \
            libgl1-mesa-dev \
            libxml2-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release -j$(nproc)

  # ---------------------------------------------------------------
  # Linux portable — maximally static binary, packaged as .7z
  # Only glibc + libGL.so are dynamic. Bundled Mesa fallback for
  # systems without OpenGL.
  # ---------------------------------------------------------------
  build-linux-portable:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dev packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build pkg-config meson \
            python3 python3-mako python3-ply python3-yaml \
            p7zip-full \
            zlib1g-dev libpng-dev libbz2-dev \
            libexpat1-dev libpcre2-dev \
            libfreetype-dev libfontconfig-dev libharfbuzz-dev \
            libxcb1-dev libxcb-glx0-dev libxcb-icccm4-dev \
            libxcb-image0-dev libxcb-keysyms1-dev libxcb-randr0-dev \
            libxcb-render-util0-dev libxcb-render0-dev libxcb-shape0-dev \
            libxcb-shm0-dev libxcb-sync-dev libxcb-xfixes0-dev \
            libxcb-xinerama0-dev libxcb-xinput-dev libxcb-xkb-dev \
            libxcb-cursor-dev \
            libx11-dev libx11-xcb-dev libxext-dev libxshmfence-dev \
            libxrender-dev libxi-dev libxrandr-dev \
            libxkbcommon-dev libxkbcommon-x11-dev \
            libgl-dev libglu1-mesa-dev libdrm-dev \
            libxml2-dev

      - name: Cache static dependencies (Qt + Mesa)
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: /opt/static-deps
          key: static-deps-v1

      - name: Build static dependencies (Qt + Mesa)
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: ./scripts/build-static-deps.sh

      - name: Build swaedit (static)
        run: ./scripts/build-swaedit-static.sh

      - name: Verify minimal dynamic deps
        run: |
          echo "=== file ==="
          file build-static/swaedit
          echo "=== ldd ==="
          ldd build-static/swaedit
          echo "=== checking for unexpected deps ==="
          UNEXPECTED=$(ldd build-static/swaedit \
            | grep '=>' \
            | grep -v -E '(libGL|libGLX|libGLdispatch|libc\.so|libm\.so|libdl\.so|libpthread\.so|librt\.so|libX|libxcb|libxkb|libfontconfig|libfreetype|libharfbuzz)' \
            || true)
          if [ -n "$UNEXPECTED" ]; then
            echo "WARNING: unexpected dynamic deps found:"
            echo "$UNEXPECTED"
          fi

      - name: Package .7z
        run: |
          mkdir -p package/swaedit/{lib,fonts}
          cp build-static/swaedit package/swaedit/
          cp -r data schemas images package/swaedit/
          cp swaedit.sh package/swaedit/
          chmod +x package/swaedit/swaedit.sh
          cp fonts/DejaVuSans.ttf fonts/DejaVuSans-Bold.ttf package/swaedit/fonts/
          cp fonts.conf package/swaedit/
          # Bundle Mesa fallback libGL.so if built
          if [ -d /opt/static-deps/mesa/lib ]; then
            cp -P /opt/static-deps/mesa/lib/libGL.so* package/swaedit/lib/ 2>/dev/null || true
            cp -P /opt/static-deps/mesa/lib/libglapi.so* package/swaedit/lib/ 2>/dev/null || true
          fi
          cd package && 7z a -mx=9 ../SWAEdit-linux-x86_64.7z swaedit/

      - name: Upload Linux artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: swaedit-linux
          path: SWAEdit-linux-x86_64.7z

  # ---------------------------------------------------------------
  # macOS — build + package .dmg
  # ---------------------------------------------------------------
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install qt@6

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$(brew --prefix qt@6)"

      - name: Build
        run: cmake --build build --config Release -j$(sysctl -n hw.ncpu)

      - name: Create app bundle
        run: |
          cd build
          mkdir -p SWAEdit.app/Contents/MacOS
          mkdir -p SWAEdit.app/Contents/Resources
          cp swaedit SWAEdit.app/Contents/MacOS/swaedit
          cp -r data SWAEdit.app/Contents/MacOS/data
          cp -r schemas SWAEdit.app/Contents/MacOS/schemas
          cp -r images SWAEdit.app/Contents/MacOS/images
          cat > SWAEdit.app/Contents/Info.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>swaedit</string>
            <key>CFBundleIdentifier</key>
            <string>pl.swmud.swaedit</string>
            <key>CFBundleName</key>
            <string>SWAEdit</string>
            <key>CFBundleVersion</key>
            <string>0.1.0</string>
            <key>CFBundleShortVersionString</key>
            <string>0.1.0</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleIconFile</key>
            <string>icon</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          PLIST

      - name: Run macdeployqt
        run: |
          $(brew --prefix qt@6)/bin/macdeployqt build/SWAEdit.app

      - name: Create DMG
        run: |
          hdiutil create -volname "SWAEdit" -srcfolder build/SWAEdit.app \
            -ov -format UDZO build/SWAEdit-macos.dmg

      - name: Upload macOS artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: swaedit-macos
          path: build/SWAEdit-macos.dmg

  # ---------------------------------------------------------------
  # Windows — build + NSIS installer (.exe)
  # ---------------------------------------------------------------
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          host: windows
          target: desktop
          arch: win64_msvc2022_64

      - name: Install libxml2
        run: |
          vcpkg install libxml2:x64-windows
          echo "CMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT\scripts\buildsystems\vcpkg.cmake" >> $env:GITHUB_ENV

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE="$env:CMAKE_TOOLCHAIN_FILE"

      - name: Build
        run: cmake --build build --config Release -j $env:NUMBER_OF_PROCESSORS

      - name: Prepare install directory
        shell: bash
        run: |
          mkdir -p package/swaedit
          cp build/Release/swaedit.exe package/swaedit/
          cp -r build/Release/data package/swaedit/ 2>/dev/null || cp -r data package/swaedit/
          cp -r build/Release/schemas package/swaedit/ 2>/dev/null || cp -r schemas package/swaedit/
          cp -r build/Release/images package/swaedit/ 2>/dev/null || cp -r images package/swaedit/
          windeployqt package/swaedit/swaedit.exe
          cp build/Release/*.dll package/swaedit/ 2>/dev/null || true

      - name: Create NSIS installer script
        shell: bash
        run: |
          cat > installer.nsi << 'NSIS'
          !include "MUI2.nsh"

          Name "SWAEdit"
          OutFile "SWAEdit-setup-x64.exe"
          InstallDir "$PROGRAMFILES64\SWAEdit"
          InstallDirRegKey HKLM "Software\SWAEdit" "InstallDir"
          RequestExecutionLevel admin

          !define MUI_ICON "images\icon.ico"
          !define MUI_ABORTWARNING

          !insertmacro MUI_PAGE_WELCOME
          !insertmacro MUI_PAGE_DIRECTORY
          !insertmacro MUI_PAGE_INSTFILES
          !insertmacro MUI_PAGE_FINISH

          !insertmacro MUI_UNPAGE_CONFIRM
          !insertmacro MUI_UNPAGE_INSTFILES

          !insertmacro MUI_LANGUAGE "English"

          Section "Install"
            SetOutPath "$INSTDIR"
            File /r "package\swaedit\*.*"

            WriteRegStr HKLM "Software\SWAEdit" "InstallDir" "$INSTDIR"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\SWAEdit" \
              "DisplayName" "SWAEdit - Star Wars MUD Area Editor"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\SWAEdit" \
              "UninstallString" '"$INSTDIR\uninstall.exe"'
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\SWAEdit" \
              "DisplayIcon" "$INSTDIR\swaedit.exe"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\SWAEdit" \
              "Publisher" "swmud.pl"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\SWAEdit" \
              "DisplayVersion" "0.1.0"
            WriteRegDWORD HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\SWAEdit" \
              "NoModify" 1
            WriteRegDWORD HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\SWAEdit" \
              "NoRepair" 1
            WriteUninstaller "$INSTDIR\uninstall.exe"

            CreateDirectory "$SMPROGRAMS\SWAEdit"
            CreateShortCut "$SMPROGRAMS\SWAEdit\SWAEdit.lnk" "$INSTDIR\swaedit.exe"
            CreateShortCut "$SMPROGRAMS\SWAEdit\Uninstall.lnk" "$INSTDIR\uninstall.exe"
            CreateShortCut "$DESKTOP\SWAEdit.lnk" "$INSTDIR\swaedit.exe"
          SectionEnd

          Section "Uninstall"
            RMDir /r "$INSTDIR"
            RMDir /r "$SMPROGRAMS\SWAEdit"
            Delete "$DESKTOP\SWAEdit.lnk"
            DeleteRegKey HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\SWAEdit"
            DeleteRegKey HKLM "Software\SWAEdit"
          SectionEnd
          NSIS

      - name: Convert icon to ICO
        shell: bash
        run: |
          # NSIS needs .ico — create a simple one from the PNG if magick is available
          if command -v magick &>/dev/null; then
            magick images/icon.png -define icon:auto-resize=256,128,64,48,32,16 images/icon.ico
          else
            # Fallback: skip icon, NSIS will use default
            sed -i 's/!define MUI_ICON.*/#/' installer.nsi
          fi

      - name: Install NSIS
        run: choco install nsis -y

      - name: Build installer
        shell: cmd
        run: |
          set PATH=%PATH%;C:\Program Files (x86)\NSIS
          makensis installer.nsi

      - name: Upload Windows artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: swaedit-windows
          path: SWAEdit-setup-x64.exe

  # ---------------------------------------------------------------
  # Release — publish artifacts when a tag is pushed
  # ---------------------------------------------------------------
  release:
    needs: [build-linux, build-linux-portable, build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: swaedit-linux
          path: release/

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: swaedit-macos
          path: release/

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: swaedit-windows
          path: release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/SWAEdit-linux-x86_64.7z
            release/SWAEdit-macos.dmg
            release/SWAEdit-setup-x64.exe
          generate_release_notes: true
