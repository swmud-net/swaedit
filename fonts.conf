<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- Standard system font directories (checked first) -->
  <dir>/usr/share/fonts</dir>
  <dir>/usr/local/share/fonts</dir>
  <dir>~/.fonts</dir>
  <dir>~/.local/share/fonts</dir>

  <!-- Bundled fallback font -->
  <dir prefix="relative">fonts</dir>

  <!-- Use temp dir for font cache to avoid permission issues -->
  <cachedir>/tmp/swaedit-fontcache</cachedir>

  <!-- Ensure bundled DejaVu Sans is available as a weak sans-serif fallback -->
  <match target="pattern">
    <test qual="any" name="family">
      <string>sans-serif</string>
    </test>
    <edit name="family" mode="append" binding="weak">
      <string>DejaVu Sans</string>
    </edit>
  </match>
</fontconfig>
